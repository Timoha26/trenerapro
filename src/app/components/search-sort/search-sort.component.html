<div class="search-sort-bar">
  <div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" placeholder="Поиск тренера, вида спорта или клуба">
  </div>
  <select class="sort-select" [(ngModel)]="selectedSort" (change)="onChangeSort(selectedSort)">
    <option *ngFor="let option of sortOptions" [ngValue]="option.sort">{{option.name}}</option>
  </select>
</div>
