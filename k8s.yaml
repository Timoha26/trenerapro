apiVersion: apps/v1
kind: Deployment
metadata:
  name: trainerpro-ui
  labels:
    app: trainerpro-ui
    version: v1
  namespace: trainerpro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trainerpro-ui
  template:
    metadata:
      labels:
        app: trainerpro-ui
        version: v1
    spec:
      containers:
      - name: trainerpro-ui
        image: timoha26/trainerpro-ui
