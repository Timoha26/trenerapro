<div class="catalog-grid" *ngIf="clubs.length > 0">

  <div class="club-card" *ngFor="let club of clubs" routerLink="clubs/{{club.id}}">
    <img src="{{club.logoUrl}}" alt="Клуб" class="club-banner">
    <div class="club-content">
      <div>
        <h4 class="club-title">{{club.name}}</h4>
        <p class="club-subtitle">{{club.sports?.join(', ')}}</p>
      </div>
      <div class="club-stats">
        <span>👥 387</span>
        <span>⚽ 203</span>
        <span>⭐ 55</span>
      </div>
    </div>
  </div>

</div>
