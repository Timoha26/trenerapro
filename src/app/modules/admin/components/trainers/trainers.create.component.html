<section id="admin_projects" class="py-5">
  <div class="container">
    <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between mb-4">
      <div>
        <h4 class="fw-bold mb-2">Тренеры - Новый тренер</h4>
      </div>
      <div class="btn-group float-end">
        <a class="btn btn-outline-success mt-3 mt-md-0" routerLink="/admin/trainers">
          <em class="fas fa-angle-left"></em>
          к тренерам
        </a>
      </div>
    </div>

    <div class="row gy-4 align-items-center">
      <div class="col-lg-12">
        <form name="trainerForm" #trainerForm="ngForm" novalidate>
          <div class="row mb-1">
            <label for="firstname" class="form-label col-sm-4 col-md-3 col-lg-2">Имя</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <input type="text" id="firstname" name="firstname" #firstname="ngModel"
                     [(ngModel)]="trainer.createTrainer.firstname" placeholder="имя" required
                     class="form-control form-control-sm"
                     [ngClass]="{'is-invalid': firstname.invalid && (firstname.touched || firstname.dirty)}">
            </div>
          </div>
          <div class="row mb-1">
            <label for="lastname" class="form-label col-sm-4 col-md-3 col-lg-2">Фамилия</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <input type="text" id="lastname" name="lastname" #lastname="ngModel"
                     [(ngModel)]="trainer.createTrainer.lastname" placeholder="фамилия" required
                     class="form-control form-control-sm"
                     [ngClass]="{'is-invalid': lastname.invalid && (lastname.touched || lastname.dirty)}">
            </div>
          </div>
          <div class="row mb-1">
            <label for="patronymic" class="form-label col-sm-4 col-md-3 col-lg-2">Отчество</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <input type="text" id="patronymic" name="patronymic" #patronymic="ngModel"
                     [(ngModel)]="trainer.createTrainer.patronymic" placeholder="отчество" required
                     class="form-control form-control-sm"
                     [ngClass]="{'is-invalid': patronymic.invalid && (patronymic.touched || patronymic.dirty)}">
            </div>
          </div>
          <div class="row mb-1">
            <label for="gender" class="form-label col-sm-4 col-md-3 col-lg-2">Пол</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <select id="gender" name="gender" #gender="ngModel"
                      [(ngModel)]="trainer.createTrainer.gender" required class="form-control form-control-sm">
                <option [ngValue]="undefined" disabled>Выберите</option>
                <option *ngFor="let option of genderOptions" [ngValue]="option.key">{{ option.name }}</option>
              </select>
            </div>
          </div>
          <div class="row mb-1">
            <label for="age" class="form-label col-sm-4 col-md-3 col-lg-2">Возраст</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <input type="number" id="age" name="age" #age="ngModel"
                     [(ngModel)]="trainer.createTrainer.age" placeholder="возраст" required
                     class="form-control form-control-sm"
                     [ngClass]="{'is-invalid': age.invalid && (age.touched || age.dirty)}">
            </div>
          </div>
          <div class="row mb-1">
            <label for="experience" class="form-label col-sm-4 col-md-3 col-lg-2">Стаж</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <input type="number" id="experience" name="experience" #experience="ngModel"
                     [(ngModel)]="trainer.createTrainer.experience" placeholder="стаж" required
                     class="form-control form-control-sm"
                     [ngClass]="{'is-invalid': experience.invalid && (experience.touched || experience.dirty)}">
            </div>
          </div>
          <div class="row mb-1">
            <label for="description" class="form-label col-sm-4 col-md-3 col-lg-2">Описание</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <textarea id="description" name="description" #description="ngModel" rows="3"
                        [(ngModel)]="trainer.createTrainer.description" placeholder="Описание" required
                        class="form-control form-control-sm"
                        [ngClass]="{'is-invalid': description.invalid && (description.touched || description.dirty)}"></textarea>
            </div>
          </div>
          <div class="row mb-1">
            <label for="price" class="form-label col-sm-4 col-md-3 col-lg-2">Цена</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <input type="text" id="price" name="price" #price="ngModel" [(ngModel)]="trainer.createTrainer.price"
                     [inputMask]="priceMask" placeholder="0.0" required class="form-control form-control-sm"
                     [ngClass]="{'is-invalid': price.invalid && (price.touched || price.dirty)}">
            </div>
          </div>
          <div class="row mb-1">
            <label for="priceGradation" class="form-label col-sm-4 col-md-3 col-lg-2">Цена за</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <select id="priceGradation" name="priceGradation" #priceGradation="ngModel"
                      [(ngModel)]="trainer.createTrainer.priceGradation" required class="form-control form-control-sm">
                <option [ngValue]="undefined" disabled>Выберите</option>
                <option *ngFor="let option of priceGradationOptions" [ngValue]="option.key">{{ option.name }}</option>
              </select>
            </div>
          </div>
          <div class="row mb-1">
            <label class="form-label col-sm-4 col-md-3 col-lg-2">Локация</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <settlement-select [settlementId]="trainer.createTrainer.settlementId" (settlementIdChanged)="trainer.createTrainer.settlementId = $event"></settlement-select>
            </div>
          </div>
          <div class="row mb-1">
            <label class="form-label col-sm-4 col-md-3 col-lg-2">Спортивные дисциплины</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <sports-select [sportIds]="trainer.sportIds"></sports-select>
            </div>
          </div>
          <div class="row mb-1">
            <label class="form-label col-sm-4 col-md-3 col-lg-2">Формат занятий</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <training-formats-select [trainingFormatIds]="trainer.trainingFormatIds"></training-formats-select>
            </div>
          </div>
          <div class="row mb-1">
            <label class="form-label col-sm-4 col-md-3 col-lg-2">Уровень подготовки</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <client-categories-select [clientCategoryIds]="trainer.clientCategoryIds"></client-categories-select>
            </div>
          </div>
          <div class="row mb-1">
            <label class="form-label col-sm-4 col-md-3 col-lg-2">Файлы</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <button type="button" class="btn btn-outline-success btn-sm float-end" (click)="addFile()"
                      title="Добавить файл">
                <em class="fa fa-plus"></em>
              </button>
            </div>
          </div>
          <div class="row mb-1">
            <div class="col-sm-6 col-md-4 col-lg-2 pb-2" *ngFor="let file of files">
              <div class="card h-100 border-dark">
                <div class="card-header">
                  <h6 class="card-title float-start">{{ file.type }}</h6>
                  <button type="button" class="btn-close btn-sm p-0 float-end" title="удалить"
                          (click)="removeFile(file.id)"></button>
                </div>
                <div class="card-body d-flex flex-column" *ngIf="isImage(file)">
                  <img src="{{file.url}}" alt="{{file.url}}"/>
                </div>
                <div class="card-body d-flex flex-column" *ngIf="isNotImage(file)">
                  {{ file.url }}
                </div>
              </div>
            </div>
          </div>
          <div class="row mb-1">
            <div class="col-12">
              <div class="btn-group w-auto float-end">
                <button type="submit" (click)="save()" [disabled]="trainerForm.invalid" class="btn btn-success px-4">
                  Сохранить
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
