<section class="categories container" #container (window:click)="closeDropdown()">
  <div class="cat-grid">
    <div class="cat-item" *ngFor="let sport of visibleSports()" (click)="selectSport(sport)">
      <i class="fas" [ngClass]="sport.icon"></i> {{ sport.name }}
    </div>
    <div class="cat-dropdown-wrapper" *ngIf="hiddenSports().length > 0" (click)="$event.stopPropagation()">
      <div class="cat-item" #toggleBtn (click)="toggleDropdown()">
        <i class="fas fa-ellipsis-h"></i> Еще
      </div>
      <div class="cat-dropdown" *ngIf="isDropdownOpen()">
        <div class="cat-item" *ngFor="let sport of hiddenSports()" (click)="selectSport(sport); closeDropdown()">
          <i class="fas" [ngClass]="sport.icon"></i> {{ sport.name }}
        </div>
      </div>
    </div>
  </div>

  <div class="cat-grid ghost" #ghostWrapper *ngIf="visibleSports().length === 0">
    <div class="cat-item" *ngFor="let sport of allSports()">
      <i class="fas" [ngClass]="sport.icon"></i> {{ sport.name }}
    </div>
  </div>
</section>
