<div class="modal-header">
  <h4 class="modal-title pull-left">{{ title }}</h4>
  <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="decline()">
    <span aria-hidden="true" class="visually-hidden">&times;</span>
  </button>
</div>
<div class="modal-body text-center">
  <p [innerHTML]="text"></p>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-default" (click)="confirm()">Да</button>
  <button type="button" class="btn btn-success" (click)="decline()">Нет</button>
</div>
