<div class="modal-header">
  <h4 class="modal-title pull-left">Новая спортивная дисциплина</h4>
  <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="cancel()">
    <span aria-hidden="true" class="visually-hidden">&times;</span>
  </button>
</div>
<form name="sportForm" #sportForm="ngForm" novalidate>
  <div class="modal-body text-center">
    <div class="row mb-1">
      <label for="name" class="form-label col-sm-4">Название</label>
      <div class="col-sm-8">
        <input type="text" id="name" name="name" #name="ngModel" [(ngModel)]="newSport.name"
               class="form-control form-control-sm" required>
      </div>
    </div>
    <div class="row mb-1">
      <label for="icon" class="form-label col-sm-4">Иконка</label>
      <div class="col-sm-8">
        <input type="text" id="icon" name="icon" #icon="ngModel" [(ngModel)]="newSport.icon"
               class="form-control form-control-sm" required>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-success" (click)="save()" [disabled]="sportForm.invalid">
      Добавить
    </button>
    <button type="button" class="btn btn-outline-danger" (click)="cancel()">
      Отмена
    </button>
  </div>
</form>
