<aside>
  <div class="filter-block">
    <div class="filter-header">
      <h3>Фильтры</h3>
      <a href="#" (click)="clearFilters($event)">Сбросить</a>
    </div>
  </div>

  <div class="filter-block">
    <div class="filter-checkbox">
      <input type="checkbox" id="verified" [checked]="dataFilters().verified" (change)="toggleVerified($event)">
      <label for="verified">Только проверенные
        <i class="far fa-question-circle" style="font-size: 12px; color: #ccc;"></i>
      </label>
    </div>
  </div>

  <div class="filter-block">
    <h3 style="font-size: 15px; font-weight: 600; margin-bottom: 12px;">Возраст ребёнка</h3>
    <div class="filter-checkbox" *ngFor="let category of clientCategories">
      <input type="checkbox" id="client_category_{{category.id}}" [checked]="category.checked" (change)="toggleClientCategory(category.id)">
      <label for="client_category_{{category.id}}">{{category.name}}</label>
    </div>
  </div>

  <div class="filter-block">
    <h3 style="font-size: 15px; font-weight: 600; margin-bottom: 12px;">Вид спорта</h3>
    <select class="filter-dropdown" [value]="getSportId()" (change)="setSport($event)">
      <option>Выбрать вид спорта</option>
      <option *ngFor="let sport of sports" value="{{sport.id}}">
        {{sport.name}}
      </option>
    </select>
  </div>

  <div class="filter-block">
    <h3 style="font-size: 15px; font-weight: 600; margin-bottom: 12px;">Цена за занятие</h3>
    <ngx-slider [(value)]="range.minValue" [(highValue)]="range.maxValue" [options]="range.options" (valueChange)="setMinPrice()" (highValueChange)="setMaxPrice()"></ngx-slider>
    <div class="range-labels">
      <span>от {{range.options.floor | currency:'RUB':'symbol':'1.0-0'}}</span>
      <span>до {{range.options.ceil | currency:'RUB':'symbol':'1.0-0'}}</span>
    </div>
  </div>

  <div class="filter-block">
    <h3 style="font-size: 15px; font-weight: 600; margin-bottom: 12px;">Рейтинг</h3>
    <div class="filter-options-row" style="flex-direction: column; gap: 8px;">
      <button class="filter-btn" style="text-align: left; width: 100%; display: flex; justify-content: space-between; align-items: center;" *ngFor="let rating of ratings" [ngClass]="{'active': dataFilters().minRating == rating.stars.length}" (click)="setRating(rating.stars.length)">
        <span>
          <em class="fas fa-star text-gold" *ngFor="let star of rating.stars"></em>
          и выше
        </span>
      </button>
    </div>
  </div>

  <div class="filter-block">
    <h3 style="font-size: 15px; font-weight: 600; margin-bottom: 12px;">Формат занятий</h3>
    <div class="filter-checkbox" *ngFor="let format of trainingFormats">
      <input type="checkbox" id="training_format_{{format.id}}" [checked]="format.checked" (change)="toggleTrainingFormat(format.id)">
      <label for="training_format_{{format.id}}">{{format.name}}</label>
    </div>
  </div>

<!--  <button class="btn-primary sidebar-submit">Показать</button>-->
</aside>
