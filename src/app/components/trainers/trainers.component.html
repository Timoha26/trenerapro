<main class="container">
  <!-- Page Header -->
  <div class="page-header">
    <h1>Тренеры <span>Найдено 128 тренеров</span></h1>
  </div>

  <!-- Search & Sort -->
  <div class="search-sort-bar">
    <div class="search-wrapper">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Поиск тренера, вида спорта или клуба">
    </div>
    <select class="sort-select">
      <option>Сначала популярные</option>
      <option>Сначала дорогие</option>
      <option>Сначала дешевые</option>
      <option>По рейтингу</option>
    </select>
  </div>

  <!-- Categories -->
  <sports></sports>

  <!-- Main Layout -->
  <div class="content-grid">

    <!-- Left Sidebar -->
    <trainers-filters></trainers-filters>

    <!-- Middle Column (Cards) - ТЕПЕРЬ ЗДЕСЬ 3 КОЛОНКИ -->
    <section>
      <div class="trainers-grid">
        <div class="trainer-card" *ngFor="let trainer of trainers.items">
          <div class="trainer-img-wrap">
            <div class="card-badge" *ngIf="trainer.verified"><i class="fas fa-check-circle"></i> Проверен</div>
            <div class="card-fav"><i class="far fa-heart"></i></div>
            <img src="{{trainer.logoUrl}}" alt="Trainer">
          </div>
          <div class="trainer-body">
            <h3>{{ trainer.firstname }} {{ trainer.lastname }}</h3>
            <p class="sport">{{ trainer.sports?.join(', ') }}</p>
            <div class="trainer-rating">★ <span>{{ trainer.rating?.value }} ({{ trainer.rating?.reviewsCount }} отзывов)</span></div>
            <div class="trainer-stats"><i class="fas fa-map-marker-alt"></i> 2,1 км от вас</div>
            <div class="trainer-stats"><i class="fas fa-child"></i> Дети 6-12 лет</div>
            <span class="trainer-price">от {{ trainer.price | currency }}/{{ trainer.priceGradation }}</span>
            <div class="trainer-actions">
              <button class="btn-outline" routerLink="/trainers/{{trainer.id}}">Подробнее</button>
              <button class="btn-primary">Записаться</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Pagination -->
      <tp-pagination [currentPage]="1" [totalItems]="trainers.count ?? 0" [itemsPerPage]="filters.limit ?? 0" (pageChange)="setPage($event)"></tp-pagination>
    </section>

    <!-- Right Sidebar -->
    <rightSidebar></rightSidebar>

  </div>
</main>
