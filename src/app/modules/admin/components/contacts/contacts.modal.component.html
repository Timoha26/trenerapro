<div class="modal-header">
  <h4 class="modal-title pull-left">Новый контакт</h4>
  <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="cancel()">
    <span aria-hidden="true" class="visually-hidden">&times;</span>
  </button>
</div>
<form name="contactForm" #contactForm="ngForm" novalidate>
  <div class="modal-body text-center">
    <div class="row mb-1">
      <label for="fullname" class="form-label col-sm-4">Имя</label>
      <div class="col-sm-8">
        <input type="text" id="fullname" name="fullname" #fullname="ngModel" [(ngModel)]="newContact.fullname"
               class="form-control form-control-sm" required>
      </div>
    </div>
    <div class="row mb-1">
      <label for="email" class="form-label col-sm-4">Email</label>
      <div class="col-sm-8">
        <input type="text" id="email" name="email" #email="ngModel" [(ngModel)]="newContact.email"
               class="form-control form-control-sm" required>
      </div>
    </div>
    <div class="row mb-1">
      <label for="phone" class="form-label col-sm-4">Номер телефона</label>
      <div class="col-sm-8">
        <input type="text" id="phone" name="phone" #phone="ngModel"
               [(ngModel)]="newContact.phone" class="form-control form-control-sm" required>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-success" (click)="save()" [disabled]="contactForm.invalid">
      Добавить
    </button>
    <button type="button" class="btn btn-outline-danger" (click)="cancel()">
      Отмена
    </button>
  </div>
</form>
