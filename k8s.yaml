apiVersion: v1
kind: Service
metadata:
  name: trainerpro-ui-service
  namespace: trainerpro
spec:
  selector:
    app: trainerpro-ui
  type: ClusterIP
  ports:
    - name: http
      port: 4200
      targetPort: 80
