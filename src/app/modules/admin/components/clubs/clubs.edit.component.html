<section id="admin_projects" class="py-5">
  <div class="container">
    <div class="d-flex flex-column flex-md-row align-items-md-end justify-content-between mb-4">
      <div>
        <h4 class="fw-bold mb-2">Клубы - Изменить</h4>
      </div>
      <div class="btn-group float-end">
        <a class="btn btn-outline-success mt-3 mt-md-0" routerLink="/admin/clubs">
          <em class="fas fa-angle-left"></em>
          к клубам
        </a>
      </div>
    </div>

    <div class="row gy-4 align-items-center">
      <div class="col-lg-12">
        <form name="clubForm" #clubForm="ngForm" novalidate>
          <div class="row mb-1">
            <label for="name" class="form-label col-sm-4 col-md-3 col-lg-2">Название</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <input type="text" id="name" name="name" #name="ngModel"
                     [(ngModel)]="club.name" placeholder="имя" required
                     class="form-control form-control-sm"
                     [ngClass]="{'is-invalid': name.invalid && (name.touched || name.dirty)}">
            </div>
          </div>
          <div class="row mb-1">
            <label for="address" class="form-label col-sm-4 col-md-3 col-lg-2">Адрес</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <input type="text" id="address" name="address" #address="ngModel"
                     [(ngModel)]="club.address" placeholder="адрес" required
                     class="form-control form-control-sm"
                     [ngClass]="{'is-invalid': address.invalid && (address.touched || address.dirty)}">
            </div>
          </div>
          <div class="row mb-1">
            <label for="description" class="form-label col-sm-4 col-md-3 col-lg-2">Описание</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <textarea id="description" name="description" #description="ngModel" rows="3"
                        [(ngModel)]="club.description" placeholder="Описание" required
                        class="form-control form-control-sm"
                        [ngClass]="{'is-invalid': description.invalid && (description.touched || description.dirty)}"></textarea>
            </div>
          </div>
          <div class="row mb-1">
            <label class="form-label col-sm-4 col-md-3 col-lg-2">Локация</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <settlement-select [settlementId]="club.settlementId" (settlementIdChanged)="club.settlementId = $event"></settlement-select>
            </div>
          </div>
          <div class="row mb-1">
            <label class="form-label col-sm-4 col-md-3 col-lg-2">Спортивные дисциплины</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <sports-select [sports]="club.sports ?? []"></sports-select>
            </div>
          </div>
          <div class="row mb-1">
            <label class="form-label col-sm-4 col-md-3 col-lg-2">Контакты</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <contacts [clubId]="club.id" [contacts]="club.contacts ?? []"></contacts>
            </div>
          </div>

          <div class="row mb-1">
            <label class="form-label col-sm-4 col-md-3 col-lg-2">Файлы</label>
            <div class="col-sm-8 col-md-9 col-lg-10">
              <button type="button" class="btn btn-outline-success btn-sm float-end" (click)="addFile()"
                      title="Добавить файл">
                <em class="fa fa-plus"></em>
              </button>
            </div>
          </div>
          <div class="row mb-1">
            <div class="col-sm-6 col-md-4 col-lg-2 pb-2" *ngFor="let file of club.files">
              <div class="card h-100 border-dark">
                <div class="card-header">
                  <h6 class="card-title float-start">{{ file.type }}</h6>
                  <button type="button" class="btn-close btn-sm p-0 float-end" title="удалить"
                          (click)="removeFile(file.id)"></button>
                </div>
                <div class="card-body d-flex flex-column" *ngIf="isImage(file)">
                  <img src="{{file.url}}" alt="{{file.url}}"/>
                </div>
                <div class="card-body d-flex flex-column" *ngIf="isNotImage(file)">
                  {{ file.url }}
                </div>
              </div>
            </div>
          </div>
          <div class="row mb-1">
            <div class="col-12">
              <div class="btn-group w-auto float-end">
                <button type="submit" (click)="save()" [disabled]="clubForm.invalid" class="btn btn-success px-4">
                  Сохранить
                </button>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
