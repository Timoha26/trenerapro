<div class="pagination">
  <div class="page-item" [class.disabled]="currentPage === 1" (click)="prevPage()">
    <i class="fas fa-chevron-left"></i>
  </div>

  <div *ngFor="let page of pages" class="page-item" (click)="onPageChange(page)" [class.active]="page === currentPage"
       [class.ellipsis]="page === '...'">{{ page }}
  </div>

  <div class="page-item" [class.disabled]="currentPage === totalPages" (click)="nextPage()">
    <i class="fas fa-chevron-right"></i>
  </div>
</div>
